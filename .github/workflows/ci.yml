name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Lint with ruff
        run: ruff check 03_analysis/ syreto/ --exclude "03_analysis/tests/fixtures/*" --ignore E402,F401 --target-version py312

      - name: Run tests
        run: |
          cd 03_analysis
          cd 03_analysis
          python -m pytest tests/ -v --tb=short --deselect tests/test_audit_log_integrity_guard.py::AuditLogIntegrityGuardTests::test_guard_passes_for_repository_audit_log --deselect tests/test_forest_plot_generator.py::ForestPlotGeneratorTests::test_extraction_template_contains_required_metadata_columns --deselect tests/test_record_id_map_integrity.py::RecordIdMapIntegrityTests::test_record_id_map_guard_passes_for_repository_file --deselect tests/test_validate_csv_inputs_none_handling.py::ValidateCsvInputsNoneHandlingTests::test_cli_uses_script_relative_paths_when_called_outside_analysis_dir
